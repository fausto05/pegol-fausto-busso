<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pegol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENÚ -->
    <section id="startScreen" class="screen active">
        <div class="menu-box">
            <h1>PEGOL ⚽</h1>
            <p>Puzle de acción futbolero</p>
            <button id="playBtn">▶ Jugar</button>
            <button id="configBtn" class="secondary">⚙ Configuración</button>
            <div id="configPanel" class="settings hidden">
                <strong>Opciones</strong>
                <label><input type="checkbox" id="musicToggle" checked> Música</label>
                <label><input type="checkbox" id="sfxToggle" checked> Efectos de sonido</label>
            </div>
        </div>
    </section>

    <!-- JUEGO -->
    <section id="gameScreen" class="screen">
        <div class="topbar">
            <span class="badge">⚽ <span id="shotsLabel">7</span></span>
            <span class="badge">★ <span id="scoreLabel">0</span></span>
            <span class="badge">🎯 <span id="targetsLabel">0</span></span>
            <button id="resetBtn" class="small">↺</button>
            <button id="backBtn" class="small">☰</button>
        </div>
        <canvas id="gameCanvas"></canvas>
        <p class="state-msg" id="stateMsg">Arrastrá para apuntar y soltá para disparar.</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
